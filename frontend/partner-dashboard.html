<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard — Buddyliko</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <script src="/lang/i18n.js"></script>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0a0e1a; color: #e2e8f0; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }
.page-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
.page-header h1 { font-size: 22px; font-weight: 700; }
.page-header p { color: #94a3b8; font-size: 13px; margin-top: 4px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: #141b2d; padding: 16px; border-radius: 12px; border: 1px solid #2e3250; }
.stat-value { font-size: 26px; font-weight: bold; color: #60a5fa; }
.stat-value.green { color: #4ade80; } .stat-value.orange { color: #fb923c; } .stat-value.purple { color: #c084fc; }
.stat-label { color: #94a3b8; font-size: 11px; margin-top: 4px; }
.section { background: #141b2d; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2e3250; }
.section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; justify-content: space-between; }
table { width: 100%; border-collapse: collapse; }
th { background: #0d1220; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 11px; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #2e3250; }
td { padding: 10px 12px; border-bottom: 1px solid #1e2235; font-size: 13px; }
tr:hover td { background: #0f172a; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-active { background: rgba(46,125,50,.2); color: #4ade80; }
.badge-suspended { background: rgba(198,40,40,.2); color: #f87171; }
.badge-trial { background: rgba(230,81,0,.2); color: #fb923c; }
.badge-FREE { background: rgba(69,90,100,.25); color: #94a3b8; }
.badge-PRO { background: rgba(21,101,192,.25); color: #60a5fa; }
.badge-ENTERPRISE { background: rgba(136,14,79,.25); color: #f472b6; }
.btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { opacity: 0.85; } .btn-primary { background: #2563eb; color: white; }
.btn-outline { background: transparent; border: 1px solid #2e3250; color: #94a3b8; }
.btn-outline:hover { border-color: #60a5fa; color: #60a5fa; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.subnav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.subnav a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 500; color: #94a3b8; background: #0d1220; border: 1px solid #2e3250; transition: all .15s; }
.subnav a:hover { border-color: #60a5fa; color: #60a5fa; }
.subnav a.active { background: #1e3a5f; color: #93c5fd; border-color: #1e3a5f; }
.alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; animation: fadeIn 0.3s; }
.alert-success { background: rgba(46,125,50,.15); color: #4ade80; border-left: 4px solid #059669; }
.alert-error { background: rgba(198,40,40,.15); color: #f87171; border-left: 4px solid #dc2626; }
.alert-info { background: rgba(21,101,192,.15); color: #60a5fa; border-left: 4px solid #2563eb; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.chart-wrap { position: relative; height: 260px; }
.not-partner { text-align: center; padding: 60px 20px; }
.not-partner h2 { font-size: 20px; margin-bottom: 12px; color: #94a3b8; }
.not-partner p { color: #64748b; font-size: 14px; }
.empty { padding: 30px; text-align: center; color: #64748b; font-size: 13px; }
.loading { padding: 20px; text-align: center; color: #64748b; }
.mono { font-family: 'SF Mono', monospace; font-size: 12px; }
.form-group select { background: #0a0e1a; border: 1px solid #2e3250; color: #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div id="buddy-topbar"></div>
<div class="container">
    <div class="subnav" id="partner-subnav">
        <a href="partner-dashboard.html" class="active">📊 Partner Dashboard</a>
        <a href="partner-orgs.html">🏢 Sub-Org</a>
    </div>
    <div id="alerts"></div>
    <div id="main-content"><div class="loading">Caricamento...</div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
const API = '/api';
const token = localStorage.getItem('buddyliko_token');
if (!token) window.location.href = 'login.html';

let charts = {};
function destroyChart(n) { if (charts[n]) { charts[n].destroy(); delete charts[n]; } }
function showAlert(msg, type='success') { const d=document.createElement('div'); d.className='alert alert-'+type; d.textContent=msg; document.getElementById('alerts').insertBefore(d,document.getElementById('alerts').firstChild); setTimeout(()=>d.remove(),4000); }
async function apiFetch(path, opts={}) { const r=await fetch(API+path, {...opts, headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json',...(opts.headers||{})}}); if(!r.ok){let e;try{e=await r.json();}catch{e={detail:'HTTP '+r.status};}throw new Error(e.detail||'Errore');}return r.json(); }
function fmtEur(v) { return '\u20ac'+parseFloat(v||0).toFixed(2); }
function fmtNum(n) { return (n||0).toLocaleString('it-IT'); }

async function init() {
    try {
        const info = await apiFetch('/partnership/info');
        if (!info.is_partner) {
            document.getElementById('main-content').innerHTML = `
                <div class="not-partner">
                    <h2>🏢 Partnership non attiva</h2>
                    <p>La tua organizzazione non è configurata come partner.<br>
                    Contatta l'amministratore per attivare il programma partnership.</p>
                </div>`;
            return;
        }
        loadDashboard();
    } catch(e) { showAlert(e.message, 'error'); }
}

async function loadDashboard() {
    try {
        const data = await apiFetch('/partnership/dashboard');
        const t = data.totals || {};
        document.getElementById('main-content').innerHTML = `
        <div class="page-header">
            <div><h1>🤝 Partner Dashboard</h1>
            <p>${data.partner?.name || ''} \u2014 ${data.month}</p></div>
        </div>
        <div class="stats">
            <div class="stat-card"><div class="stat-value">${t.direct_children||0}</div><div class="stat-label">Sub-org dirette</div></div>
            <div class="stat-card"><div class="stat-value">${t.sub_orgs||0}</div><div class="stat-label">Totale org gestite</div></div>
            <div class="stat-card"><div class="stat-value">${fmtNum(t.total_ops)}</div><div class="stat-label">Operazioni totali</div></div>
            <div class="stat-card"><div class="stat-value purple">${fmtNum(t.total_ai)}</div><div class="stat-label">AI Calls totali</div></div>
            <div class="stat-card"><div class="stat-value green">${fmtEur(t.total_fees_eur)}</div><div class="stat-label">Canoni mensili</div></div>
            <div class="stat-card"><div class="stat-value green">${fmtEur(t.total_billable_eur)}</div><div class="stat-label">Usage fatturabile</div></div>
            <div class="stat-card"><div class="stat-value orange">${fmtEur(t.total_revenue_share_eur)}</div><div class="stat-label">Revenue share</div></div>
            <div class="stat-card"><div class="stat-value">${t.active||0} / ${t.suspended||0}</div><div class="stat-label">Attive / Sospese</div></div>
        </div>
        <div class="grid-2">
            <div class="section">
                <div class="section-title">🏢 Sub-org dirette</div>
                <div id="sub-org-table"></div>
            </div>
            <div class="section">
                <div class="section-title">📊 Revenue per sub-org</div>
                <div class="chart-wrap"><canvas id="revenueChart"></canvas></div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">💰 Revenue Share Cascata
                <a href="partner-orgs.html" class="btn btn-primary btn-sm">Gestisci sub-org \u2192</a>
            </div>
            <div id="rev-share-table"></div>
        </div>`;

        renderSubOrgTable(data.sub_orgs || []);
        renderRevenueChart(data.sub_orgs || []);
        loadRevShare();
    } catch(e) { showAlert(e.message, 'error'); }
}

function renderSubOrgTable(orgs) {
    if (!orgs.length) { document.getElementById('sub-org-table').innerHTML='<div class="empty">Nessuna sub-org</div>'; return; }
    document.getElementById('sub-org-table').innerHTML = `<table><thead><tr>
        <th>Nome</th><th>Piano</th><th>Stato</th><th>Ops</th><th>Fatturabile</th><th>Rev Share</th>
    </tr></thead><tbody>${orgs.map(o=>`<tr>
        <td><a href="partner-orgs.html?id=${o.org_id}" style="color:#60a5fa;text-decoration:none">${o.name}</a>
            ${o.sub_children_count?'<span style="font-size:10px;color:#64748b"> (+'+o.sub_children_count+' sub)</span>':''}</td>
        <td><span class="badge badge-${o.plan}">${o.plan}</span></td>
        <td><span class="badge badge-${o.status}">${o.status}</span></td>
        <td>${fmtNum(o.operations)}</td>
        <td class="mono" style="color:#4ade80">${fmtEur(o.billable_eur)}</td>
        <td class="mono" style="color:#fb923c">${fmtEur(o.revenue_share_eur)} (${o.revenue_share_pct}%)</td>
    </tr>`).join('')}</tbody></table>`;
}

function renderRevenueChart(orgs) {
    destroyChart('revenue');
    const canvas = document.getElementById('revenueChart');
    if (!orgs.length) return;
    const COLORS = ['#3b82f6','#8b5cf6','#f59e0b','#10b981','#ef4444','#06b6d4','#f472b6','#a3e635'];
    charts.revenue = new Chart(canvas, {
        type: 'bar', data: {
            labels: orgs.map(o=>o.name.substring(0,15)),
            datasets: [
                { label: 'Fatturabile', data: orgs.map(o=>parseFloat(o.billable_eur||0)), backgroundColor: '#4ade8088', borderColor: '#4ade80', borderWidth:1 },
                { label: 'Rev Share', data: orgs.map(o=>parseFloat(o.revenue_share_eur||0)), backgroundColor: '#fb923c88', borderColor: '#fb923c', borderWidth:1 },
            ]
        }, options: { responsive:true, maintainAspectRatio:false,
            scales: { y:{ticks:{color:'#64748b'},grid:{color:'#1e223522'}}, x:{ticks:{color:'#94a3b8',font:{size:10}}} },
            plugins: { legend:{labels:{color:'#94a3b8'}} } }
    });
}

async function loadRevShare() {
    try {
        const data = await apiFetch('/partnership/revenue-share');
        const nodes = data.nodes || [];
        if (!nodes.length) { document.getElementById('rev-share-table').innerHTML='<div class="empty">Nessun dato</div>'; return; }
        document.getElementById('rev-share-table').innerHTML = `<table><thead><tr>
            <th>Org</th><th>Livello</th><th>Revenue diretto</th><th>Da sotto-org</th><th>Totale</th><th>%</th><th>Share al parent</th><th>Netto</th>
        </tr></thead><tbody>${nodes.map(n=>`<tr>
            <td>${'\u00a0\u00a0'.repeat(Math.max(0,n.depth-1))}${n.depth>1?'\u2514\u2500 ':''}${n.name}</td>
            <td style="text-align:center">${n.depth}</td>
            <td class="mono">${fmtEur(n.direct_revenue_eur)}</td>
            <td class="mono" style="color:#c084fc">${fmtEur(n.received_from_children_eur)}</td>
            <td class="mono" style="color:#4ade80">${fmtEur(n.total_revenue_eur)}</td>
            <td>${n.revenue_share_pct}%</td>
            <td class="mono" style="color:#fb923c">${fmtEur(n.share_to_parent_eur)}</td>
            <td class="mono" style="font-weight:600">${fmtEur(n.net_retained_eur)}</td>
        </tr>`).join('')}
        <tr style="background:#0d1220;font-weight:700">
            <td colspan="6">Totale ricevuto dal partner</td>
            <td colspan="2" class="mono" style="color:#4ade80;font-size:15px">${fmtEur(data.total_received_eur)}</td>
        </tr></tbody></table>`;
    } catch(e) { document.getElementById('rev-share-table').innerHTML='<div class="empty">'+e.message+'</div>'; }
}

init();
</script>
<script src="/assets/topbar.js"></script>
</body></html>
