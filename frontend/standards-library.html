<!DOCTYPE html>
<html lang="it"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Standards Library — Buddyliko</title>
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<script src="/lang/i18n.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:#0a0e1a;color:#e2e8f0}
.container{max-width:1300px;margin:0 auto;padding:24px 20px}
.page-header{margin-bottom:20px}.page-header h1{font-size:22px;font-weight:700}
.page-header p{color:#94a3b8;font-size:13px;margin-top:4px}
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#141b2d;padding:12px 18px;border-radius:10px;border:1px solid #2e3250;text-align:center;min-width:110px}
.stat-val{font-size:20px;font-weight:700;color:#93c5fd}.stat-label{font-size:10px;color:#64748b;margin-top:2px}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters select,.filters input{background:#0d1220;border:1px solid #2e3250;color:#e2e8f0;border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit}
.filters input{width:220px}
.domain-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.dtab{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;background:#141b2d;border:1px solid #2e3250;color:#94a3b8;transition:all .15s}
.dtab.active,.dtab:hover{background:#1e3a5f;color:#93c5fd;border-color:#1e3a5f}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.card{background:#141b2d;border-radius:12px;padding:16px;border:1px solid #2e3250;cursor:pointer;transition:all .2s}
.card:hover{border-color:#3b82f6;transform:translateY(-1px)}
.card-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.card-icon{font-size:28px;flex-shrink:0}.card-title{font-size:14px;font-weight:600}
.card-short{font-size:11px;color:#64748b}.card-desc{font-size:12px;color:#94a3b8;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;background:#0d1220;color:#64748b;border:1px solid #1e2235}
.tag-domain{color:#60a5fa;border-color:rgba(96,165,250,.3)}.tag-region{color:#4ade80;border-color:rgba(74,222,128,.3)}.tag-helger{color:#f472b6;border-color:rgba(244,114,182,.3)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#141b2d;border-radius:14px;padding:24px;border:1px solid #2e3250;width:100%;max-width:700px;max-height:90vh;overflow-y:auto}
.detail-header{display:flex;gap:14px;margin-bottom:16px}.detail-icon{font-size:42px}
.detail-name{font-size:18px;font-weight:700}.detail-org{color:#94a3b8;font-size:12px;margin-top:2px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.detail-item{background:#0d1220;padding:10px;border-radius:8px}.detail-item label{font-size:10px;color:#64748b;display:block;margin-bottom:2px}
.detail-item span{font-size:13px}
.detail-links{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.detail-links a{color:#60a5fa;font-size:12px;text-decoration:none;padding:4px 10px;background:#0d1220;border-radius:6px;border:1px solid #1e2235}
.detail-links a:hover{border-color:#3b82f6}
.related-list{margin-top:14px}.related-item{display:inline-block;background:#0d1220;padding:4px 10px;border-radius:6px;font-size:12px;margin:2px;cursor:pointer;border:1px solid #1e2235}
.related-item:hover{border-color:#3b82f6;color:#93c5fd}
.btn-outline{background:transparent;border:1px solid #2e3250;color:#94a3b8;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.pagination{display:flex;gap:6px;justify-content:center;margin-top:16px}
.pagination button{background:#0d1220;border:1px solid #2e3250;color:#94a3b8;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.pagination button.active{background:#1e3a5f;color:#93c5fd}
@media(max-width:768px){.card-grid{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr}}
</style></head>
<body>
<div id="buddy-topbar"></div>
<div class="container">
    <div class="page-header"><h1 id="p-title">📚</h1><p id="p-sub"></p></div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="domain-tabs" id="domain-tabs"></div>
    <div class="filters">
        <input id="search-q" onkeyup="if(event.key==='Enter')doSearch()">
        <select id="f-region" onchange="doSearch()"></select>
        <select id="f-format" onchange="doSearch()"></select>
        <select id="f-sort" onchange="doSearch()"></select>
    </div>
    <div class="card-grid" id="results"></div>
    <div class="pagination" id="pagination"></div>
</div>
<div class="modal-overlay" id="detail-modal"><div class="modal" id="detail-content"></div></div>
<script>
const API='/api';const token=localStorage.getItem('buddyliko_token');if(!token)window.location.href='login.html';
const lang=(localStorage.getItem('buddyliko_lang')||navigator.language?.slice(0,2)||'it');
const isEN=lang==='en';
function L(it,en){return isEN?en:it}

// Fill i18n texts
document.getElementById('p-title').textContent='📚 '+L('Libreria Standard','Standards Library');
document.getElementById('p-sub').textContent=L('Catalogo standard EDI, B2B, Healthcare, Payments — EU, US, Internazionali','EDI, B2B, Healthcare, Payments standards catalog — EU, US, International');
document.getElementById('search-q').placeholder='🔍 '+L('Cerca standard...','Search standards...');
const fRegion=document.getElementById('f-region');fRegion.innerHTML='<option value="">'+L('Tutte le regioni','All regions')+'</option>';
const fFormat=document.getElementById('f-format');fFormat.innerHTML='<option value="">'+L('Tutti i formati','All formats')+'</option><option value="xml">XML</option><option value="json">JSON</option><option value="edi">EDI</option><option value="edifact">EDIFACT</option><option value="fixed">Fixed-width</option>';
const fSort=document.getElementById('f-sort');fSort.innerHTML='<option value="popularity">'+L('Più usati','Most popular')+'</option><option value="name">'+L('Nome','Name')+'</option><option value="newest">'+L('Più recenti','Newest')+'</option><option value="region">'+L('Regione','Region')+'</option>';

let currentDomain='',currentPage=1;
async function apiFetch(p){const r=await fetch(API+p,{headers:{'Authorization':'Bearer '+token}});if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}

async function init(){
    const[stats,domains,regions]=await Promise.all([
        apiFetch('/standards/stats').catch(()=>({})),
        apiFetch('/standards/domains').catch(()=>({domains:[]})),
        apiFetch('/standards/regions').catch(()=>({regions:[]}))
    ]);
    document.getElementById('stats-bar').innerHTML=
        `<div class="stat"><div class="stat-val">${stats.total||0}</div><div class="stat-label">Standard</div></div>`+
        `<div class="stat"><div class="stat-val">${stats.domains||0}</div><div class="stat-label">${L('Domini','Domains')}</div></div>`+
        `<div class="stat"><div class="stat-val">${stats.regions||0}</div><div class="stat-label">${L('Regioni','Regions')}</div></div>`+
        `<div class="stat"><div class="stat-val">${stats.with_helger||0}</div><div class="stat-label">Helger libs</div></div>`+
        `<div class="stat"><div class="stat-val">${stats.with_schema||0}</div><div class="stat-label">${L('Con schema','With schema')}</div></div>`;
    const dtabs=domains.domains||[];
    document.getElementById('domain-tabs').innerHTML=
        `<span class="dtab active" onclick="filterDomain('')">${L('Tutti','All')}</span>`+
        dtabs.map(d=>`<span class="dtab" onclick="filterDomain('${d.domain}')">${d.domain} (${d.count})</span>`).join('');
    (regions.regions||[]).forEach(r=>{const o=document.createElement('option');o.value=r.region;o.textContent=`${r.region} (${r.count})`;fRegion.appendChild(o)});
    doSearch();
}

function filterDomain(d){currentDomain=d;currentPage=1;document.querySelectorAll('.dtab').forEach(t=>t.classList.toggle('active',
    (d===''&&t.textContent.startsWith(L('Tutti','All')))||t.textContent.startsWith(d)));doSearch()}

async function doSearch(page){
    currentPage=page||1;
    let qs=`page=${currentPage}&sort_by=${fSort.value}`;
    const q=document.getElementById('search-q').value;if(q)qs+=`&q=${encodeURIComponent(q)}`;
    if(currentDomain)qs+=`&domain=${currentDomain}`;
    const reg=fRegion.value;if(reg)qs+=`&region=${reg}`;
    const fmt=fFormat.value;if(fmt)qs+=`&format_type=${fmt}`;
    const data=await apiFetch('/standards/browse?'+qs);
    renderCards(data.standards||[]);renderPagination(data.page,data.pages,data.total);
}

function renderCards(stds){
    document.getElementById('results').innerHTML=stds.map(s=>`<div class="card" onclick="openDetail('${s.slug}')">
        <div class="card-top"><span class="card-icon">${s.icon||'📄'}</span><div><div class="card-title">${s.name}</div><div class="card-short">${s.org_body||''} ${s.version?'v'+s.version:''}</div></div></div>
        <div class="card-desc">${s.description||''}</div>
        <div class="card-tags"><span class="tag tag-domain">${s.domain}</span><span class="tag tag-region">${s.region}</span>${s.format_type?'<span class="tag">'+s.format_type+'</span>':''}${s.helger_lib?'<span class="tag tag-helger">ph: '+s.helger_lib+'</span>':''}</div>
    </div>`).join('')||`<div style="grid-column:1/-1;text-align:center;color:#64748b;padding:40px">${L('Nessuno standard trovato','No standards found')}</div>`}

function renderPagination(page,pages,total){
    const el=document.getElementById('pagination');if(pages<=1){el.innerHTML='';return}
    let h='';for(let i=1;i<=Math.min(pages,10);i++)h+=`<button class="${i===page?'active':''}" onclick="doSearch(${i})">${i}</button>`;
    el.innerHTML=h+`<span style="color:#64748b;font-size:11px;padding:6px">${total} ${L('totali','total')}</span>`}

async function openDetail(slug){
    const s=await apiFetch('/standards/'+slug);
    let rhtml='';try{const rel=await apiFetch('/standards/'+slug+'/related');
    if(rel.related&&rel.related.length)rhtml=`<div class="related-list"><strong style="font-size:12px">${L('Standard correlati:','Related standards:')}</strong><br>`+
        rel.related.map(r=>`<span class="related-item" onclick="openDetail('${r.slug}')">${r.icon||''} ${r.short_name||r.name}</span>`).join('')+'</div>'}catch{}
    const tx=(s.transaction_types||[]).join(', ');
    document.getElementById('detail-content').innerHTML=`
    <div class="detail-header"><span class="detail-icon">${s.icon||'📄'}</span><div>
        <div class="detail-name">${s.name}</div><div class="detail-org">${s.org_body||''} ${s.version?'— v'+s.version:''}</div></div></div>
    <p style="color:#94a3b8;font-size:13px;line-height:1.6;margin-bottom:14px">${s.long_description||s.description||''}</p>
    <div class="detail-grid">
        <div class="detail-item"><label>${L('Dominio','Domain')}</label><span>${s.domain}</span></div>
        <div class="detail-item"><label>${L('Regione','Region')}</label><span>${s.region}</span></div>
        <div class="detail-item"><label>${L('Formato','Format')}</label><span>${s.format_type||'—'}</span></div>
        <div class="detail-item"><label>${L('Versione','Version')}</label><span>${s.version||'—'}</span></div>
        ${s.helger_lib?`<div class="detail-item"><label>Helger Library</label><span class="tag tag-helger">${s.helger_lib}</span></div>`:''}
        ${s.helger_maven?`<div class="detail-item"><label>Maven</label><span style="font-size:11px;word-break:break-all">${s.helger_maven}</span></div>`:''}
        ${tx?`<div class="detail-item" style="grid-column:1/-1"><label>Transaction Types</label><span>${tx}</span></div>`:''}
    </div>
    <div class="detail-links">
        ${s.spec_url?`<a href="${s.spec_url}" target="_blank">📋 Spec</a>`:''}
        ${s.schema_url?`<a href="${s.schema_url}" target="_blank">📐 Schema</a>`:''}
        ${s.schematron_url?`<a href="${s.schematron_url}" target="_blank">✅ Schematron</a>`:''}
        ${s.github_url?`<a href="${s.github_url}" target="_blank">🐙 GitHub</a>`:''}
        ${s.sample_url?`<a href="${s.sample_url}" target="_blank">📝 Sample</a>`:''}
    </div>
    ${rhtml}
    <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn-outline" style="background:#1e3a5f;color:#93c5fd;border-color:#2563eb;font-size:12px;padding:7px 14px;border-radius:6px;cursor:pointer" onclick="useInMapper('${s.slug}','input')">⬅️ ${L('Usa come Input','Use as Input')}</button>
            <button class="btn-outline" style="background:#1e3a5f;color:#93c5fd;border-color:#2563eb;font-size:12px;padding:7px 14px;border-radius:6px;cursor:pointer" onclick="useInMapper('${s.slug}','output')">➡️ ${L('Usa come Output','Use as Output')}</button>
        </div>
        <button class="btn-outline" onclick="document.getElementById('detail-modal').classList.remove('show')">${L('Chiudi','Close')}</button>
    </div>`;
    document.getElementById('detail-modal').classList.add('show')}
document.getElementById('detail-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.target.classList.remove('show')});
function useInMapper(slug, direction) {
    const token = localStorage.getItem('buddyliko_token');
    fetch('/api/standards/' + slug, {headers:{'Authorization':'Bearer '+token}})
    .then(r=>r.json()).then(s=>{
        const csvUrl = s.mapper_csv_url || '';
        const info = {action:'standard', slug:slug, direction:direction, name:s.name, mapper_csv_url:csvUrl};
        sessionStorage.setItem('buddyliko_open_standard', JSON.stringify(info));
        window.location.href = 'app.html';
    }).catch(()=>{ alert('Errore caricamento standard'); });
}
init();
</script>
<script>if(typeof i18n!=="undefined")i18n.init();</script>
<script src="/assets/topbar.js"></script>
<script src="/assets/theme.js"></script>
</body></html>
