<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing — Buddyliko</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <script src="/lang/i18n.js"></script>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0a0e1a; color: #e2e8f0; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 22px; font-weight: 700; }
.page-header p { color: #94a3b8; font-size: 13px; margin-top: 4px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card { background: #141b2d; padding: 18px; border-radius: 12px; border: 1px solid #2e3250; }
.stat-value { font-size: 28px; font-weight: bold; color: #60a5fa; }
.stat-value.green { color: #4ade80; }
.stat-value.orange { color: #fb923c; }
.stat-value.purple { color: #c084fc; }
.stat-label { color: #94a3b8; font-size: 12px; margin-top: 4px; }
.section { background: #141b2d; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2e3250; }
.section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
.section-title .count { background: #1e3a5f; color: #60a5fa; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
table { width: 100%; border-collapse: collapse; }
th { background: #0d1220; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2e3250; }
td { padding: 10px 12px; border-bottom: 1px solid #1e2235; font-size: 13px; color: #e2e8f0; }
tr:hover td { background: #0f172a; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-owner { background: rgba(136,14,79,.25); color: #f472b6; }
.badge-admin { background: rgba(46,125,50,.25); color: #4ade80; }
.badge-finance { background: rgba(230,81,0,.25); color: #fb923c; }
.badge-developer { background: rgba(21,101,192,.25); color: #60a5fa; }
.badge-operator { background: rgba(74,20,140,.25); color: #c084fc; }
.badge-viewer { background: rgba(69,90,100,.25); color: #94a3b8; }
.badge-active { background: rgba(46,125,50,.2); color: #4ade80; }
.badge-trial { background: rgba(230,81,0,.2); color: #fb923c; }
.badge-suspended { background: rgba(198,40,40,.2); color: #f87171; }
.badge-FREE { background: rgba(69,90,100,.25); color: #94a3b8; }
.badge-PRO { background: rgba(21,101,192,.25); color: #60a5fa; }
.badge-ENTERPRISE { background: rgba(136,14,79,.25); color: #f472b6; }
.badge-PARTNER { background: rgba(46,125,50,.25); color: #4ade80; }
.btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-primary { background: #2563eb; color: white; }
.btn-success { background: #059669; color: white; }
.btn-danger { background: #dc2626; color: white; }
.btn-outline { background: transparent; border: 1px solid #2e3250; color: #94a3b8; }
.btn-outline:hover { border-color: #60a5fa; color: #60a5fa; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; animation: fadeIn 0.3s; }
.alert-success { background: rgba(46,125,50,.15); color: #4ade80; border-left: 4px solid #059669; }
.alert-error { background: rgba(198,40,40,.15); color: #f87171; border-left: 4px solid #dc2626; }
.alert-info { background: rgba(21,101,192,.15); color: #60a5fa; border-left: 4px solid #2563eb; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; color: #94a3b8; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: #0a0e1a; border: 1px solid #2e3250; color: #e2e8f0; border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: inherit; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #2563eb; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.progress-bar { background: #0d1220; border-radius: 6px; height: 8px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #2563eb, #3b82f6); transition: width 0.5s; }
.progress-fill.warn { background: linear-gradient(90deg, #d97706, #f59e0b); }
.progress-fill.danger { background: linear-gradient(90deg, #dc2626, #ef4444); }
.empty { padding: 30px; text-align: center; color: #64748b; font-size: 13px; }
.loading { padding: 20px; text-align: center; color: #64748b; }
.chart-container { height: 200px; position: relative; margin-top: 12px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.tab-bar { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid #2e3250; }
.tab { padding: 8px 16px; cursor: pointer; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 500; color: #94a3b8; background: none; border: none; transition: all 0.15s; }
.tab.active { color: #60a5fa; border-bottom: 2px solid #60a5fa; margin-bottom: -2px; background: rgba(37,99,235,.1); }
.tab:hover:not(.active) { background: #0f172a; }
.subnav { display: flex; gap: 8px; margin-bottom: 20px; }
.subnav a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 500; color: #94a3b8; background: #0d1220; border: 1px solid #2e3250; transition: all .15s; }
.subnav a:hover { border-color: #60a5fa; color: #60a5fa; }
.subnav a.active { background: #1e3a5f; color: #93c5fd; border-color: #1e3a5f; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.6); z-index: 200; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #141b2d; border-radius: 12px; padding: 24px; border: 1px solid #2e3250; width: 100%; max-width: 480px; }
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 768px) { .form-row, .grid-2 { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } }

    .plan-card { background: #0d1220; border: 1px solid #2e3250; border-radius: 10px; padding: 16px; text-align: center; transition: all .2s; }
    .plan-card.current { border-color: #2563eb; box-shadow: 0 0 20px rgba(37,99,235,.2); }
    .plan-card h3 { font-size: 16px; margin-bottom: 4px; }
    .plan-price { font-size: 28px; font-weight: 800; color: #60a5fa; }
    .plan-price span { font-size: 13px; font-weight: 400; color: #64748b; }
    .plan-features { text-align: left; font-size: 12px; color: #94a3b8; margin-top: 12px; line-height: 1.8; }
    .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .cost-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cost-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e2235; font-size: 13px; }
    .cost-item:last-child { border-bottom: none; }
    .cost-label { color: #94a3b8; }
    .cost-val { font-weight: 600; }
    </style>
</head>
<body>
<div id="buddy-topbar"></div>
<div class="container">
    <div class="subnav">
        <a href="org-dashboard.html">📊 Dashboard</a>
        <a href="org-users.html">👥 Utenti</a>
        <a href="org-billing.html" class="active">💰 Billing</a>
        <a href="org-partners.html">🤝 Partner</a>
        <a href="org-reports.html">📈 Report</a>
        <a href="partner-dashboard.html">🤝 Partnership</a>
        <a href="org-settings.html">⚙️ Impostazioni</a>
    </div>
    <div id="alerts"></div>
    <div class="page-header"><h1>💰 Billing & Consumo</h1><p id="billing-sub">Caricamento...</p></div>

    <!-- Piano corrente + consumo -->
    <div class="stats" id="billing-stats"><div class="loading">Caricamento...</div></div>

    <!-- Progress bars consumo -->
    <div class="section">
        <div class="section-title">📊 Utilizzo mese corrente</div>
        <div id="usage-section"></div>
    </div>

    <!-- Breakdown costi -->
    <div class="grid-2">
        <div class="section">
            <div class="section-title">💶 Dettaglio costi</div>
            <div id="cost-breakdown"></div>
        </div>
        <div class="section">
            <div class="section-title">🤖 Costi AI</div>
            <div id="ai-detail"></div>
        </div>
    </div>

    <!-- Piani disponibili -->
    <div class="section">
        <div class="section-title">📋 Piani disponibili</div>
        <div class="plans-grid" id="plans-grid"><div class="loading">Caricamento...</div></div>
    </div>

    <!-- Trend -->
    <div class="section">
        <div class="section-title">📈 Trend giornaliero</div>
        <canvas id="costChart" height="200"></canvas>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>

const API = '/api';
const token = localStorage.getItem('buddyliko_token');
if (!token) window.location.href = 'login.html';

function showAlert(msg, type='success') {
    const d = document.createElement('div');
    d.className = 'alert alert-' + type;
    d.textContent = msg;
    const el = document.getElementById('alerts');
    el.insertBefore(d, el.firstChild);
    setTimeout(() => d.remove(), 4000);
}

async function apiFetch(path, opts={}) {
    const r = await fetch(API + path, {
        ...opts,
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts.headers||{}) }
    });
    if (!r.ok) {
        let e; try { e = await r.json(); } catch { e = { detail: 'HTTP ' + r.status }; }
        throw new Error(e.detail || e.message || 'Errore');
    }
    return r.json();
}

function fmtBytes(b) {
    if (!b || b === 0) return '0 B';
    const u = ['B','KB','MB','GB','TB'];
    const i = Math.floor(Math.log(Math.abs(b)) / Math.log(1024));
    return (b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
}

function fmtEur(v) { return '€' + parseFloat(v || 0).toFixed(2); }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('it-IT'); }
function fmtDateTime(d) { if (!d) return '—'; return new Date(d).toLocaleString('it-IT', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function fmtNum(n) { return (n||0).toLocaleString('it-IT'); }
function pct(used, total) { if (!total || total <= 0) return 0; return Math.min(100, Math.round((used / total) * 100)); }
function pctClass(p) { return p >= 90 ? 'danger' : p >= 70 ? 'warn' : ''; }

let costChartInstance = null;

async function loadBilling() {
    try {
        const [org, summary, plans, trend, aiDetail] = await Promise.all([
            apiFetch('/org'),
            apiFetch('/costs/summary').catch(() => null),
            apiFetch('/pricing/plans').catch(() => ({plans:[]})),
            apiFetch('/costs/daily-trend').catch(() => ({data:[]})),
            apiFetch('/costs/ai-detail').catch(() => ({data:[]})),
        ]);
        const plan = org.plan || 'FREE';
        document.getElementById('billing-sub').innerHTML =
            'Piano <span class="badge badge-' + plan + '">' + plan + '</span> · ' + org.name;

        renderBillingStats(summary, plan);
        renderUsage(summary);
        renderCostBreakdown(summary);
        renderAIDetail(aiDetail.data || []);
        renderPlans(plans.plans || [], plan);
        renderCostTrend(trend.data || []);
    } catch(e) { showAlert(e.message, 'error'); }
}

function renderBillingStats(s, plan) {
    if (!s) { document.getElementById('billing-stats').innerHTML = '<div class="stat-card"><div class="empty">Cost Engine non attivo</div></div>'; return; }
    document.getElementById('billing-stats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${fmtEur(s.monthly_fee_eur)}</div><div class="stat-label">Canone mensile</div></div>
        <div class="stat-card"><div class="stat-value">${fmtNum(s.transforms_used)}</div><div class="stat-label">Trasformazioni usate</div></div>
        <div class="stat-card"><div class="stat-value">${fmtNum(s.ai_calls_used)}</div><div class="stat-label">AI calls usate</div></div>
        <div class="stat-card"><div class="stat-value green">${fmtEur(s.billable_eur)}</div><div class="stat-label">Totale fatturabile</div></div>
        <div class="stat-card"><div class="stat-value orange">${fmtEur(s.platform_cost_eur)}</div><div class="stat-label">Costo piattaforma</div></div>
        <div class="stat-card"><div class="stat-value purple">${fmtEur(s.margin_eur)}</div><div class="stat-label">Margine</div></div>`;
}

function renderUsage(s) {
    if (!s) { document.getElementById('usage-section').innerHTML = '<div class="empty">Dati non disponibili</div>'; return; }
    const items = [
        { label: 'Trasformazioni', used: s.transforms_used, total: s.transforms_included, remaining: s.transforms_remaining },
        { label: 'AI Calls', used: s.ai_calls_used, total: s.ai_calls_included, remaining: s.ai_calls_remaining },
    ];
    document.getElementById('usage-section').innerHTML = items.map(i => {
        const p = pct(i.used, i.total);
        const rem = i.total > 0 ? i.remaining + ' rimanenti' : 'illimitato';
        return `<div style="margin-bottom:18px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:13px;font-weight:600">${i.label}</span>
                <span style="font-size:12px;color:#94a3b8">${fmtNum(i.used)} / ${i.total > 0 ? fmtNum(i.total) : '∞'} (${rem})</span>
            </div>
            <div class="progress-bar" style="height:12px"><div class="progress-fill ${pctClass(p)}" style="width:${i.total>0?p:0}%"></div></div>
        </div>`;
    }).join('');
}

function renderCostBreakdown(s) {
    if (!s) { document.getElementById('cost-breakdown').innerHTML = '<div class="empty">—</div>'; return; }
    document.getElementById('cost-breakdown').innerHTML = `
        <div class="cost-breakdown">
            <div><div class="cost-item"><span class="cost-label">Canone mensile</span><span class="cost-val">${fmtEur(s.monthly_fee_eur)}</span></div></div>
            <div><div class="cost-item"><span class="cost-label">Costo AI (USD)</span><span class="cost-val">$${parseFloat(s.ai_cost_usd||0).toFixed(4)}</span></div></div>
            <div><div class="cost-item"><span class="cost-label">Costo piattaforma</span><span class="cost-val">${fmtEur(s.platform_cost_eur)}</span></div></div>
            <div><div class="cost-item"><span class="cost-label">Fatturabile</span><span class="cost-val" style="color:#4ade80">${fmtEur(s.billable_eur)}</span></div></div>
            <div><div class="cost-item"><span class="cost-label">Margine</span><span class="cost-val" style="color:#c084fc">${fmtEur(s.margin_eur)}</span></div></div>
            <div><div class="cost-item"><span class="cost-label">Errori</span><span class="cost-val" style="color:#f87171">${s.error_count||0}</span></div></div>
        </div>`;
}

function renderAIDetail(data) {
    if (!data.length) { document.getElementById('ai-detail').innerHTML = '<div class="empty">Nessuna chiamata AI questo mese</div>'; return; }
    document.getElementById('ai-detail').innerHTML = '<table><thead><tr><th>Provider</th><th>Model</th><th>Calls</th><th>Costo</th></tr></thead><tbody>' +
        data.map(d => `<tr><td>${d.ai_provider||''}</td><td style="font-size:11px">${(d.ai_model||'').substring(0,25)}</td><td>${d.calls}</td><td>${fmtEur(d.billable_eur)}</td></tr>`).join('') +
        '</tbody></table>';
}

function renderPlans(plans, currentPlan) {
    if (!plans.length) { document.getElementById('plans-grid').innerHTML = '<div class="empty">Nessun piano</div>'; return; }
    document.getElementById('plans-grid').innerHTML = plans.map(p => {
        const isCur = p.plan === currentPlan;
        return `<div class="plan-card ${isCur ? 'current' : ''}">
            <h3>${p.plan}</h3>
            <div class="plan-price">${fmtEur(p.monthly_fee_eur)}<span>/mese</span></div>
            ${isCur ? '<div style="margin-top:6px"><span class="badge badge-active">ATTIVO</span></div>' : ''}
            <div class="plan-features">
                ✅ ${fmtNum(p.included_transforms)} trasformazioni/m<br>
                🤖 ${fmtNum(p.included_ai_calls)} AI calls/m<br>
                👥 ${p.included_users} utenti<br>
                🔑 ${p.included_api_tokens} API token<br>
                💾 ${(p.included_storage_mb/1024).toFixed(0)} GB storage<br>
                📈 AI markup: ${p.ai_markup_pct}%
            </div>
        </div>`;
    }).join('');
}

function renderCostTrend(data) {
    const canvas = document.getElementById('costChart');
    if (!data.length) { canvas.parentElement.innerHTML += '<div class="empty">Nessun dato</div>'; return; }
    if (costChartInstance) costChartInstance.destroy();
    costChartInstance = new Chart(canvas, {
        type: 'line',
        data: {
            labels: data.map(d => d.period_key ? d.period_key.slice(5) : ''),
            datasets: [
                { label: 'Fatturabile €', data: data.map(d => parseFloat(d.billable_eur_total||0)), borderColor: '#4ade80', backgroundColor: '#4ade8022', fill: true, tension: 0.3 },
                { label: 'Costo €', data: data.map(d => parseFloat(d.platform_cost_eur||0)), borderColor: '#f87171', backgroundColor: '#f8717122', fill: true, tension: 0.3 },
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: { y: { beginAtZero: true, ticks: { color: '#64748b' }, grid: { color: '#1e223544' } }, x: { ticks: { color: '#64748b' }, grid: { display: false } } },
            plugins: { legend: { labels: { color: '#94a3b8' } } }
        }
    });
}

loadBilling();
</script>
<script src="/assets/topbar.js"></script>
</body></html>
